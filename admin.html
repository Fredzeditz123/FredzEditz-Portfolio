<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FredzEditz - Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; }
    .login-box h1 { margin-bottom: 30px; text-align: center; font-size: 2rem; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
    .form-group input { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; font-size: 1rem; }
    .form-group input:focus { outline: none; background: rgba(255, 255, 255, 0.12); border-color: #3b82f6; }
    .btn { width: 100%; padding: 12px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
    .dashboard { display: none; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    .header h1 { font-size: 2rem; }
    .logout-btn { padding: 10px 20px; background: rgba(255, 59, 48, 0.2); border: 1px solid rgba(255, 59, 48, 0.5); color: #ff3b30; border-radius: 8px; cursor: pointer; }
    .upload-section { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 30px; margin-bottom: 40px; }
    .upload-section h2 { margin-bottom: 20px; font-size: 1.5rem; }
    .upload-form { display: grid; gap: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; font-size: 1rem; font-family: inherit; }
    .form-group select option { background: #0f172a; color: white; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; background: rgba(255, 255, 255, 0.12); border-color: #3b82f6; }
    .form-note { font-size: 0.85rem; color: #cbd5e1; margin-top: 4px; }
    .projects-section { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 30px; overflow-x: auto; }
    .projects-section h2 { margin-bottom: 20px; font-size: 1.5rem; }
    .projects-table { width: 100%; border-collapse: collapse; }
    .projects-table th { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-weight: 600; }
    .projects-table td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .thumbnail-preview { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
    .delete-btn { padding: 8px 12px; background: rgba(255, 59, 48, 0.2); border: none; color: #ff3b30; border-radius: 6px; cursor: pointer; }
    .success-msg { padding: 12px; background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.5); color: #10b981; border-radius: 8px; margin-bottom: 20px; display: none; }
    .error-msg { padding: 12px; background: rgba(255, 59, 48, 0.2); border: 1px solid rgba(255, 59, 48, 0.5); color: #ff3b30; border-radius: 8px; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>FredzEditz Admin</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="password">Admin Password</label>
          <input type="password" id="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
      <p style="text-align: center; margin-top: 20px; color: #cbd5e1; font-size: 0.9rem;">
      </p>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="container">
      <div class="header">
        <h1>Project Manager</h1>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>

      <div class="success-msg" id="successMsg"></div>
      <div class="error-msg" id="errorMsg"></div>

      <!-- Upload Section -->
      <div class="upload-section">
        <h2>Add New Project</h2>
        <form class="upload-form" id="uploadForm">
          <div class="form-row">
            <div class="form-group">
              <label>Project Title *</label>
              <input type="text" id="title" required>
            </div>
            <div class="form-group">
              <label>Category *</label>
              <select id="category" required>
                <option value="">Select Category</option>
                <option value="Brand Edits">Brand Edits</option>
                <option value="Movie/Anime Edits">Movie/Anime Edits</option>
                <option value="Cinematic Edits">Cinematic Edits</option>
              </select>
            </div>
          </div>

          <div class="form-group full">
            <label>Description</label>
            <textarea id="description" rows="3"></textarea>
          </div>

          <div class="form-group full">
            <label>Video URL *</label>
            <input type="url" id="videoUrl" required placeholder="https://youtube.com/... or https://vimeo.com/... or https://drive.google.com/...">
          </div>

          <div class="form-group full">
            <label>Custom Thumbnail URL (Optional)</label>
            <input type="url" id="thumbnailUrl" placeholder="https://example.com/image.jpg">
            <p class="form-note">💡 Leave empty to auto-generate from video. Add your own image URL for custom thumbnails.</p>
          </div>

          <button type="submit" class="btn">Add Project</button>
        </form>
      </div>

      <!-- Projects List -->
      <div class="projects-section">
        <h2>Projects</h2>
        <table class="projects-table">
          <thead>
            <tr>
              <th>Thumbnail</th>
              <th>Title</th>
              <th>Category</th>
              <th>Video URL</th>
              <th>Thumbnail URL</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="projectsList">
            <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const ADMIN_PASSWORD = 'freedom123';
    const sb = createClient(
      'https://ljvqcpzkegfzdoucfexw.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqdnFjcHprZWdmemRvdWNmZXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTI5NTAsImV4cCI6MjA5NTg4ODk1MH0.rvRiKUq4gL5guYSimQMRqwUZwaxgP4B4QSVKUHqlXKM'
    );

    // Login
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      if (document.getElementById('password').value === ADMIN_PASSWORD) {
        localStorage.setItem('adminLoggedIn', 'true');
        showDashboard();
      } else {
        alert('❌ Wrong password!');
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('adminLoggedIn');
      document.getElementById('password').value = '';
      showLogin();
    });

    function showLogin() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadProjects();
    }

    // Upload Project
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = document.getElementById('title').value;
      const category = document.getElementById('category').value;
      const description = document.getElementById('description').value;
      const videoUrl = document.getElementById('videoUrl').value;
      const thumbnailUrl = document.getElementById('thumbnailUrl').value; // NEW: Get thumbnail URL

      if (!title || !category || !videoUrl) {
        showError('Please fill all required fields');
        return;
      }

      try {
        const { data, error } = await sb.from('projects').insert([{
          title, 
          category, 
          description, 
          video_url: videoUrl,
          thumbnail_url: thumbnailUrl || null // NEW: Include thumbnail_url (null if empty)
        }]);

        if (error) throw error;
        showSuccess('✓ Project added!');
        document.getElementById('uploadForm').reset();
        loadProjects();
      } catch (error) {
        showError('Error: ' + error.message);
      }
    });

    // Load Projects
    async function loadProjects() {
      try {
        const { data, error } = await sb.from('projects').select('*').order('created_at', { ascending: false });
        if (error) throw error;

        const tbody = document.getElementById('projectsList');
        tbody.innerHTML = '';

        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No projects yet</td></tr>';
          return;
        }

        data.forEach(p => {
          const thumbnailHtml = p.thumbnail_url 
            ? `<img src="${p.thumbnail_url}" alt="thumb" class="thumbnail-preview" onerror="this.src='https://via.placeholder.com/40x40?text=No'">`
            : '<span style="color: #cbd5e1;">Auto-gen</span>';
          
          const thumbnailDisplay = p.thumbnail_url 
            ? `<small style="color: #10b981;">✓ Custom</small>`
            : '<small style="color: #cbd5e1;">Auto</small>';

          tbody.innerHTML += `
            <tr>
              <td>${thumbnailHtml}</td>
              <td>${p.title}</td>
              <td>${p.category}</td>
              <td><a href="${p.video_url}" target="_blank" style="color: #3b82f6; font-size: 0.85rem;">View</a></td>
              <td>${thumbnailDisplay}</td>
              <td><button class="delete-btn" onclick="deleteProject(${p.id})">Delete</button></td>
            </tr>
          `;
        });
      } catch (error) {
        showError('Error: ' + error.message);
      }
    }

    // Delete Project
    window.deleteProject = async (id) => {
      if (!confirm('Delete this project?')) return;
      try {
        const { error } = await sb.from('projects').delete().eq('id', id);
        if (error) throw error;
        showSuccess('✓ Deleted!');
        loadProjects();
      } catch (error) {
        showError('Error: ' + error.message);
      }
    };

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    // Initialize
    if (localStorage.getItem('adminLoggedIn') === 'true') {
      showDashboard();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
